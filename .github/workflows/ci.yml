name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: >
            .github/workflows
            infrastructure/kubernetes
            docker/docker-compose.yml
            monitoring
            ansible

      - name: GitHub Actions lint
        uses: raven-actions/actionlint@v2

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning

      - name: Install Ansible lint tools
        run: pipx install --include-deps ansible-lint

      - name: Ansible syntax check
        run: >
          ansible-playbook
          -i ansible/inventory.example.ini
          ansible/playbook.yml
          --syntax-check

      - name: Ansible lint
        run: ansible-lint ansible/playbook.yml

  validate-html:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Check HTML files
        run: |
          while IFS= read -r -d '' f; do
            echo "Checking $f"
            xmllint --noout "$f" 2>&1 || echo "Warning: xmllint not available, skipping"
          done < <(find app -name '*.html' -print0)

  validate-infrastructure:
    runs-on: ubuntu-latest
    needs: validate-html
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Start Kind cluster
        uses: helm/kind-action@v1

      - name: Docker Compose config
        run: docker compose -f docker/docker-compose.yml config

      - name: Docker build
        run: docker build -f docker/Dockerfile -t portfolio/app:ci .

      - name: Terraform format
        run: terraform fmt -recursive -check infrastructure/terraform

      - name: Terraform init
        working-directory: infrastructure/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infrastructure/terraform
        run: terraform validate

      - name: Kubernetes server dry-run
        run: |
          kubectl apply -f infrastructure/kubernetes/namespaces.yaml
          kubectl apply --dry-run=server -f infrastructure/kubernetes/

  docker-publish:
    runs-on: ubuntu-latest
    needs: validate-infrastructure
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
