name: CD Pipeline

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  STAGING_NAMESPACE: ${{ vars.STAGING_NAMESPACE || 'staging' }}
  PRODUCTION_NAMESPACE: ${{ vars.PRODUCTION_NAMESPACE || 'production' }}
  PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Export image name
        id: meta
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-image
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"

      - name: Deploy to staging
        run: |
          set -euo pipefail
          trap 'kubectl rollout undo deployment/app -n "${STAGING_NAMESPACE}"' ERR
          kubectl set image deployment/app \
            app=${{ needs.build-image.outputs.image }} \
            -n "${STAGING_NAMESPACE}"
          kubectl rollout status deployment/app -n "${STAGING_NAMESPACE}" --timeout=120s

  deploy-production:
    runs-on: ubuntu-latest
    needs:
      - build-image
      - deploy-staging
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"

      - name: Rolling deployment
        run: |
          set -euo pipefail
          trap 'kubectl rollout undo deployment/app -n "${PRODUCTION_NAMESPACE}"' ERR
          kubectl set image deployment/app \
            app=${{ needs.build-image.outputs.image }} \
            -n "${PRODUCTION_NAMESPACE}"
          kubectl rollout status deployment/app -n "${PRODUCTION_NAMESPACE}" --timeout=180s

      - name: Smoke test
        run: curl -sf "${PRODUCTION_URL}/health"
