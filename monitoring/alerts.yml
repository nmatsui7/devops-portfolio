groups:
  - name: platform
    rules:
      - alert: HighCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total{namespace="production"}[5m])) by (pod) > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} CPU usage above 80%"
          description: "CPU usage has been above 80% for more than 5 minutes."

      - alert: HighMemoryUsage
        expr: sum(container_memory_working_set_bytes{namespace="production"}) by (pod) / sum(container_spec_memory_limit_bytes{namespace="production"}) by (pod) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} memory usage above 85%"

      - alert: PodDown
        expr: kube_deployment_status_replicas_unavailable{namespace="production"} > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.deployment }} is down"
          description: "Deployment {{ $labels.deployment }} has unavailable replicas."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Error rate above 5% on {{ $labels.pod }}"

      - alert: DiskFull
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk is almost full on {{ $labels.instance }}"
          description: "Less than 10% disk space remaining."
