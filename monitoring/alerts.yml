groups:
  - name: portfolio-local
    rules:
      - alert: PortfolioAppDown
        expr: up{job="portfolio-app-local"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Tutorial app target is down"
          description: "Prometheus cannot scrape the local tutorial app target."

      - alert: TutorialAppNotReady
        expr: portfolio_app_ready != 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Tutorial app readiness metric is not healthy"
          description: "The local demo app is not reporting portfolio_app_ready = 1."
