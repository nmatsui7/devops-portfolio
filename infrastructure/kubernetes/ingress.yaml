apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.your-domain.example
      secretName: app-tls
  rules:
    # Replace this placeholder host before applying outside a sandbox cluster.
    - host: app.your-domain.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: portfolio-app
