---
- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\s+'
    line: "PasswordAuthentication {{ admin_ops_ssh_password_authentication }}"
    backup: true
  notify: Restart ssh

- name: Disable SSH root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin\s+'
    line: "PermitRootLogin {{ admin_ops_ssh_permit_root_login }}"
    backup: true
  notify: Restart ssh
