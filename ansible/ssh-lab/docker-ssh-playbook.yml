---
- name: Configure Docker SSH workers as small web servers
  hosts: workers
  become: true
  gather_facts: true

  tasks:
    - name: Show which host Ansible is configuring
      ansible.builtin.debug:
        msg: "Configuring {{ inventory_hostname }} running {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"

    - name: Install nginx and curl
      ansible.builtin.apt:
        name:
          - nginx
          - curl
        state: present
        update_cache: true

    - name: Deploy custom nginx page from template
      ansible.builtin.template:
        src: templates/index.html.j2
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: "0644"

    - name: Start nginx inside the container
      ansible.builtin.command: nginx
      register: nginx_start
      failed_when:
        - nginx_start.rc != 0
        - "'bind()' not in nginx_start.stderr"
      changed_when: nginx_start.rc == 0

    - name: Verify the local web page from inside each target
      ansible.builtin.command: curl -s http://localhost
      changed_when: false
      register: web_check

    - name: Show verification output
      ansible.builtin.debug:
        msg: "{{ web_check.stdout_lines }}"
