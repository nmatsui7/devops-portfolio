---
services:
  ssh-target:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: ansible-ssh-target
    hostname: ansible-ssh-target
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - PASSWORD_ACCESS=true
      - USER_NAME=ansible
      - USER_PASSWORD=ansible123
      - SUDO_ACCESS=true
    ports:
      - "2222:2222"
    restart: unless-stopped
