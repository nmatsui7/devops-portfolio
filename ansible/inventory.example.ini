[admin_nodes]
# Replace this with an EC2 bastion/admin host created outside this demo.
# No private keys, secrets, or real hostnames are committed.
bastion.example.internal ansible_user=ubuntu

[admin_nodes:vars]
ansible_python_interpreter=/usr/bin/python3
admin_ops_backup_bucket=s3://example-portfolio-backups
admin_ops_enable_node_exporter=false
admin_ops_ssh_hardening_enabled=true
