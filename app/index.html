<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Tutorial</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(31, 41, 55, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 16px;
      padding: 48px;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .badge {
      display: inline-block;
      background: #22c55e;
      color: #052e16;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin: 16px 0;
    }
    p { color: #94a3b8; line-height: 1.6; margin: 12px 0; }
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin: 24px 0;
    }
    .metric {
      background: rgba(15, 23, 42, 0.6);
      border-radius: 12px;
      padding: 16px 8px;
    }
    .metric-value { font-size: 1.5rem; font-weight: 700; color: #38bdf8; }
    .metric-label { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
    .version {
      font-size: 0.75rem;
      color: #475569;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
      padding-top: 16px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DevOps Tutorial</h1>
    <p>Static Nginx demo app packaged for Docker and Kubernetes</p>
    <div class="badge">All systems operational</div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-value">200</div>
        <div class="metric-label">Health</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="metrics">--</div>
        <div class="metric-label">Metrics</div>
      </div>
      <div class="metric">
        <div class="metric-value">1</div>
        <div class="metric-label">Local App</div>
      </div>
    </div>
    <div class="version">Demo scope: Docker, Kubernetes manifests, Terraform scaffold</div>
  </div>
  <script>
    async function fetchMetrics() {
      try {
        const res = await fetch('/metrics');
        const text = await res.text();
        document.getElementById('metrics').textContent =
          text.includes('portfolio_app_ready 1') ? 'ready' : '--';
      } catch { /* ignore */ }
    }
    fetchMetrics();
    setInterval(fetchMetrics, 5000);
  </script>
</body>
</html>
