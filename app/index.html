<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 16px;
      padding: 48px;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .badge {
      display: inline-block;
      background: #22c55e;
      color: #052e16;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin: 16px 0;
    }
    p { color: #94a3b8; line-height: 1.6; margin: 12px 0; }
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin: 24px 0;
    }
    .metric {
      background: rgba(15, 23, 42, 0.6);
      border-radius: 12px;
      padding: 16px 8px;
    }
    .metric-value { font-size: 1.5rem; font-weight: 700; color: #38bdf8; }
    .metric-label { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
    .version {
      font-size: 0.75rem;
      color: #475569;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
      padding-top: 16px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Portfolio App</h1>
    <p>Containerized microservice deployed on Kubernetes</p>
    <div class="badge">All systems operational</div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-value" id="uptime">--</div>
        <div class="metric-label">Uptime</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="requests">--</div>
        <div class="metric-label">Requests</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="pods">3</div>
        <div class="metric-label">Active Pods</div>
      </div>
    </div>
    <div class="version">v2.1.0 &middot; deployed via ArgoCD</div>
  </div>
  <script>
    async function fetchMetrics() {
      try {
        const res = await fetch('/metrics');
        const text = await res.text();
        document.getElementById('uptime').textContent =
          text.match(/process_uptime_seconds (\d+)/)?.[1] + 's' || '--';
        document.getElementById('requests').textContent =
          text.match(/http_requests_total (\d+)/)?.[1] || '--';
      } catch { /* ignore */ }
    }
    fetchMetrics();
    setInterval(fetchMetrics, 5000);
  </script>
</body>
</html>
